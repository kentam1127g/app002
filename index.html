<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棒人間</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    }

    /* ---- 日記UI ---- */
    #diary-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e1e1e;
      color: #f2f0eb;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: pointer;
      z-index: 10;
    }
    #diary-btn:hover { background: #3a3a3a; }

    #utterance-btn {
      position: fixed;
      bottom: 24px;
      right: 130px;
      background: transparent;
      color: #888;
      border: 1px solid #444;
      padding: 10px 16px;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }
    #utterance-btn:hover  { color: #f2f0eb; border-color: #888; }
    #utterance-btn:disabled { color: #444; border-color: #333; cursor: default; }

    #diary-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #f2f0eb;
      border: 2px solid #1e1e1e;
      padding: 28px 24px;
      width: 340px;
      z-index: 100;
    }
    #diary-panel h3 {
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 0.1em;
      color: #1e1e1e;
      margin-bottom: 14px;
    }
    #diary-text {
      width: 100%;
      height: 110px;
      border: 1px solid #aaa;
      background: #faf8f4;
      padding: 10px;
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      color: #1e1e1e;
      outline: none;
    }
    #diary-text:focus { border-color: #1e1e1e; }
    #char-count {
      font-size: 11px;
      color: #888;
      text-align: right;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    /* 写真添付エリア */
    #photo-area {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
    }
    #photo-add-btn {
      background: transparent;
      border: 1px solid #ccc;
      color: #888;
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
    }
    #photo-add-btn:hover { border-color: #888; color: #1e1e1e; }
    #photo-preview-wrap {
      display: none;
      position: relative;
    }
    #photo-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border: 1px solid #ccc;
      display: block;
    }
    #photo-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 16px;
      height: 16px;
      background: #1e1e1e;
      color: #f2f0eb;
      border: none;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #diary-result {
      min-height: 28px;
      font-size: 12px;
      color: #555;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }
    .panel-btns { display: flex; gap: 10px; }
    #diary-submit {
      flex: 1;
      background: #1e1e1e;
      color: #f2f0eb;
      border: none;
      padding: 9px;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #diary-submit:hover    { background: #3a3a3a; }
    #diary-submit:disabled { background: #888; cursor: default; }
    #diary-close {
      background: transparent;
      color: #888;
      border: 1px solid #ccc;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    #diary-close:hover { border-color: #888; color: #1e1e1e; }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 50;
    }

    /* ---- デバッグパネル ---- */
    #debug-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10,10,10,0.7);
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border: 1px solid #333;
      cursor: pointer;
      z-index: 300;
      letter-spacing: 0.1em;
    }
    #debug-toggle:hover { color: #aaa; }

    #debug-panel {
      display: none;
      position: fixed;
      top: 36px;
      left: 12px;
      background: rgba(8, 8, 8, 0.92);
      color: #c8c8c8;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.65;
      padding: 12px 14px;
      width: 260px;
      z-index: 200;
      border: 1px solid #2a2a2a;
    }
    .d-section {
      margin-bottom: 9px;
      padding-bottom: 9px;
      border-bottom: 1px solid #222;
    }
    .d-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .d-title {
      color: #555;
      font-size: 9.5px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .d-row { display: flex; justify-content: space-between; gap: 6px; }
    .d-row .k { color: #555; }
    .d-row .v { color: #e0e0e0; text-align: right; }
    #d-words {
      font-size: 10.5px;
      margin-top: 3px;
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #d-words .w-pos { color: #9ecfaa; }
    #d-words .w-neg { color: #cf9e9e; }
    #d-words .w-neu { color: #c8c8c8; }
    .d-word-row { display: flex; justify-content: space-between; align-items: center; line-height: 1.9; }
    .d-del-btn {
      background: transparent;
      color: #3a3a3a;
      border: none;
      font-size: 10px;
      cursor: pointer;
      padding: 0 2px;
      font-family: 'Courier New', monospace;
      flex-shrink: 0;
      line-height: 1;
    }
    .d-del-btn:hover { color: #cf9e9e; }
    .d-tags  { color: #f0c060; word-break: break-all; font-size: 10.5px; margin-top: 3px; }
    .d-block { color: #9ecfaa; font-size: 10px; line-height: 1.5; white-space: pre-wrap; margin-top: 3px; }

    /* ---- MDアップロードパネル（開発用） ---- */
    #md-toggle {
      position: fixed;
      top: 12px;
      left: 52px;
      background: rgba(10,10,10,0.7);
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border: 1px solid #333;
      cursor: pointer;
      z-index: 300;
      letter-spacing: 0.1em;
    }
    #md-toggle:hover { color: #aaa; }

    #md-panel {
      display: none;
      position: fixed;
      top: 36px;
      left: 52px;
      background: rgba(8,8,8,0.92);
      color: #c8c8c8;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.65;
      padding: 12px 14px;
      width: 300px;
      z-index: 200;
      border: 1px solid #2a2a2a;
    }
    #md-drop-zone {
      border: 1px dashed #444;
      padding: 12px;
      text-align: center;
      color: #555;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      transition: border-color 0.15s, color 0.15s;
    }
    #md-drop-zone.drag-over { border-color: #888; color: #aaa; }
    #md-drop-zone:hover     { border-color: #666; color: #888; }
    #md-file-list {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    .md-file-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
      border-bottom: 1px solid #1a1a1a;
      gap: 6px;
      font-size: 10px;
    }
    .md-file-row .fname { color: #c8c8c8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .md-file-row .fsize { color: #555; flex-shrink: 0; }
    .md-file-row .fstatus { flex-shrink: 0; min-width: 48px; text-align: right; }
    .fstatus.pending  { color: #555; }
    .fstatus.running  { color: #f0c060; }
    .fstatus.done     { color: #9ecfaa; }
    .fstatus.error    { color: #cf9e9e; }
    #md-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    #md-process {
      flex: 1;
      background: #1e3a1e;
      color: #9ecfaa;
      border: 1px solid #2a4a2a;
      padding: 5px;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    #md-process:hover    { background: #254a25; }
    #md-process:disabled { background: #111; color: #444; border-color: #222; cursor: default; }
    #md-clear {
      background: transparent;
      color: #555;
      border: 1px solid #333;
      padding: 5px 10px;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
    }
    #md-clear:hover { color: #888; border-color: #555; }
    #md-log {
      max-height: 120px;
      overflow-y: auto;
      font-size: 9.5px;
      line-height: 1.6;
      color: #666;
    }
    #md-log .log-ok   { color: #9ecfaa; }
    #md-log .log-err  { color: #cf9e9e; }
    #md-log .log-info { color: #888; }
  </style>
</head>
<body>

  <div id="overlay"></div>

  <div id="diary-panel">
    <h3>今日の日記</h3>
    <textarea id="diary-text" maxlength="300" placeholder="今日のことを書いてください..."></textarea>
    <div id="char-count">0 / 300</div>

    <div id="photo-area">
      <input type="file" id="photo-input" accept="image/*" style="display:none">
      <div id="photo-preview-wrap">
        <img id="photo-preview" alt="添付写真">
        <button id="photo-remove" type="button">×</button>
      </div>
      <button id="photo-add-btn" type="button">写真を添付</button>
    </div>

    <div id="diary-result"></div>
    <div class="panel-btns">
      <button id="diary-submit">ポストに入れる</button>
      <button id="diary-close">閉じる</button>
    </div>
  </div>

  <button id="utterance-btn">発話</button>
  <button id="diary-btn">日記を書く</button>

  <!-- TXTアップロードパネル（開発用） -->
  <button id="md-toggle">TXT</button>
  <div id="md-panel">
    <div class="d-title" style="margin-bottom:8px;">TXT BULK IMPORT &nbsp;<span style="color:#333">dev only</span></div>
    <div id="md-drop-zone">
      <input type="file" id="md-input" multiple accept=".txt" style="display:none">
      .txtファイルをドロップ、またはクリック
    </div>
    <div id="md-file-list"></div>
    <div id="md-controls">
      <button id="md-process" disabled>一括処理</button>
      <button id="md-clear">クリア</button>
    </div>
    <div id="md-log"></div>
  </div>

  <!-- デバッグパネル -->
  <button id="debug-toggle">D</button>
  <div id="debug-panel">
    <div class="d-section">
      <div class="d-title">FIGURE</div>
      <div class="d-row"><span class="k">name</span>  <span class="v" id="d-name">—</span></div>
      <div class="d-row"><span class="k">state</span> <span class="v" id="d-state">—</span></div>
      <div class="d-row"><span class="k">pos x</span> <span class="v" id="d-pos">—</span></div>
      <div class="d-row"><span class="k">vx</span>    <span class="v" id="d-vx">—</span></div>
    </div>
    <div class="d-section">
      <div class="d-title">MOOD / PERSONALITY</div>
      <div class="d-row"><span class="k">mood</span>        <span class="v" id="d-mood">—</span></div>
      <div class="d-row"><span class="k">personality</span> <span class="v" id="d-personality">—</span></div>
    </div>
    <div class="d-section">
      <div class="d-title">WORD BANK &nbsp;<span id="d-word-count" style="color:#444"></span></div>
      <div id="d-words">—</div>
    </div>
    <div class="d-section">
      <div class="d-title">QUIRKS BANK &nbsp;<span id="d-quirk-count" style="color:#444"></span></div>
      <div id="d-quirks" class="d-tags">—</div>
    </div>
    <div class="d-section">
      <div class="d-title">PATTERN</div>
      <div id="d-pattern" class="d-block">—</div>
    </div>
    <div class="d-section">
      <div class="d-title">SHORT TERM</div>
      <div class="d-row"><span class="k">events</span> <span class="v" id="d-short-count">0</span></div>
    </div>
    <div class="d-section">
      <div class="d-title">SYSTEM</div>
      <div class="d-row"><span class="k">fps</span>     <span class="v" id="d-fps">—</span></div>
      <div class="d-row"><span class="k">storage</span> <span class="v" id="d-storage">—</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    const W = 480;
    const H = 320;

    const C = {
      bg:        0xf2f0eb,
      wall:      0x1e1e1e,
      floorFill: 0xe8e4dc,
      baseboard: 0x888880,
    };

    const WALL_W  = 18;
    const CEIL_H  = 14;
    const FLOOR_H = 44;
    const GROUND  = H - FLOOR_H;

    const CHAIR = {
      x:     360,
      seatY: GROUND - 32,
      seatW: 34,
      seatH: 4,
      backW: 4,
      backH: 42,
    };

    // ---- メモリ管理 ----
    const MEM_KEYS = {
      wordBank:  'wordBank',
      quirks:    'quirksBank',
      shortTerm: 'shortTerm',
      pattern:   'pattern',
    };

    function loadWordBank() {
      const stored = JSON.parse(localStorage.getItem(MEM_KEYS.wordBank) || '[]');
      // 旧フォーマット（文字列配列）からの移行
      return stored.map(item =>
        typeof item === 'string'
          ? { word: item, weight: 1, emotion: 'neutral', category: 'other', linked: [] }
          : item
      );
    }

    const mem = {
      get quirks()    { return JSON.parse(localStorage.getItem(MEM_KEYS.quirks)    || '[]'); },
      get shortTerm() { return JSON.parse(localStorage.getItem(MEM_KEYS.shortTerm) || '[]'); },
      get pattern()   { return localStorage.getItem(MEM_KEYS.pattern) || null; },
    };

    let wordBank = loadWordBank();

    function saveWordBank() {
      localStorage.setItem(MEM_KEYS.wordBank, JSON.stringify(wordBank));
    }

    // 単語帳に追加（重み・共起リンクを更新）
    function addWordsToBank(newWords) {
      const filtered = newWords.filter(w => isValidWord(w.word));
      const inEntry  = filtered.map(w => w.word);

      filtered.forEach(({ word, emotion, category }) => {
        const existing = wordBank.find(w => w.word === word);
        if (existing) {
          existing.weight++;
          // 同エントリの単語を相互リンク
          inEntry.forEach(w => {
            if (w !== word && !existing.linked.includes(w)) {
              existing.linked.push(w);
            }
          });
        } else {
          wordBank.push({
            word,
            weight:   1,
            emotion:  emotion  || 'neutral',
            category: category || 'other',
            linked:   inEntry.filter(w => w !== word),
          });
        }
      });
      saveWordBank();
    }

    // ---- OpenAI API ----

    const WORD_BLOCKLIST = new Set([
      'neutral', 'positive', 'negative',
      'person', 'food', 'place', 'emotion', 'event', 'other',
      'word', 'category', 'json', 'null', 'true', 'false', 'array', 'object',
    ]);
    const isValidWord = w => w && w.length >= 2 && !WORD_BLOCKLIST.has(w.toLowerCase());

    // 日記の長さに応じた抽出数（固有名詞枠は別）
    function otherWordCount(len) {
      if (len < 100) return 2;
      if (len < 200) return 3;
      return 4;
    }

    // JSONパース（```json で囲まれている場合や、レスポンス中の配列も探す）
    function parseWordJSON(raw) {
      // そのままパース
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
      } catch (_) {}
      // ```json ... ``` で囲まれている場合
      const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (fenced) {
        try {
          const parsed = JSON.parse(fenced[1].trim());
          if (Array.isArray(parsed)) return parsed;
        } catch (_) {}
      }
      // レスポンス中の [...] を探す
      const arrayMatch = raw.match(/\[[\s\S]*?\]/);
      if (arrayMatch) {
        try {
          const parsed = JSON.parse(arrayMatch[0]);
          if (Array.isArray(parsed)) return parsed;
        } catch (_) {}
      }
      return [];
    }

    async function extractWordsFromDiary(diaryText) {
      const n = otherWordCount(diaryText.length);
      const res = await fetch('/api/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            {
              role: 'system',
              content: `以下の優先順位でこの日記から単語を抽出し、JSON配列のみ返してください。

優先順位：
1. 人名・地名（category: person または place）を全て含める（最大3個）
2. 感情語を1〜2個（category: emotion）
3. その他の印象的な単語を${n}個（food / event / other）

フィールド：word / emotion（positive・negative・neutral）/ category（person・food・place・emotion・event・other）
注意：動詞は必ず辞書形（原形）で抽出する。「寝ないと」→「寝る」、「食べなきゃ」→「食べる」のように、義務・否定の語尾は取り除いて原形にする。
説明文は不要。JSON配列のみ返す。`,
            },
            { role: 'user', content: diaryText },
          ],
          max_tokens: 200,
          temperature: 0.7,
        }),
      });
      const data = await res.json();
      return parseWordJSON(data.choices[0].message.content.trim());
    }

    async function extractWordsFromPhoto(base64) {
      const res = await fetch('/api/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
              {
                type: 'text',
                text: `この写真から印象的な単語を3〜5個抽出し、JSON配列のみ返してください。
フィールド：word / emotion（positive・negative・neutral）/ category（person・food・place・emotion・event・other）
説明文は不要。JSON配列のみ。`,
              },
            ],
          }],
          max_tokens: 150,
          temperature: 0.7,
        }),
      });
      const data = await res.json();
      return parseWordJSON(data.choices[0].message.content.trim());
    }

    // 画像をリサイズしてbase64に変換（API送信前の圧縮）
    function resizeImage(file, maxDim = 512) {
      return new Promise(resolve => {
        const img  = new Image();
        const url  = URL.createObjectURL(file);
        img.onload = () => {
          const scale  = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
        };
        img.src = url;
      });
    }

    // ---- 日記UI ----
    const panel     = document.getElementById('diary-panel');
    const overlay   = document.getElementById('overlay');
    const textarea  = document.getElementById('diary-text');
    const charCount = document.getElementById('char-count');
    const result    = document.getElementById('diary-result');
    const submitBtn = document.getElementById('diary-submit');

    document.getElementById('diary-btn').addEventListener('click', () => {
      panel.style.display = 'block';
      overlay.style.display = 'block';
      textarea.focus();
    });
    document.getElementById('diary-close').addEventListener('click', closePanel);
    overlay.addEventListener('click', closePanel);

    function closePanel() {
      panel.style.display = 'none';
      overlay.style.display = 'none';
      result.textContent = '';
      clearPhoto();
    }

    textarea.addEventListener('input', () => {
      charCount.textContent = `${textarea.value.length} / 300`;
    });

    // ---- 写真添付 ----
    let photoBase64 = null;

    const photoInput       = document.getElementById('photo-input');
    const photoPreviewWrap = document.getElementById('photo-preview-wrap');
    const photoPreview     = document.getElementById('photo-preview');

    document.getElementById('photo-add-btn').addEventListener('click', () => {
      photoInput.click();
    });

    photoInput.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      photoBase64 = await resizeImage(file);
      photoPreview.src = `data:image/jpeg;base64,${photoBase64}`;
      photoPreviewWrap.style.display = 'block';
      document.getElementById('photo-add-btn').style.display = 'none';
    });

    document.getElementById('photo-remove').addEventListener('click', clearPhoto);

    function clearPhoto() {
      photoBase64 = null;
      photoInput.value = '';
      photoPreviewWrap.style.display = 'none';
      document.getElementById('photo-add-btn').style.display = 'block';
    }

    // ---- 送信 ----
    submitBtn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      if (text.length < 10 && !photoBase64) {
        result.textContent = 'もう少し書いてみてください';
        return;
      }

      submitBtn.disabled = true;
      result.textContent = '読んでいます...';

      try {
        const allWords = [];

        if (text.length >= 10) {
          const diaryWords = await extractWordsFromDiary(text);
          allWords.push(...diaryWords);
        }

        if (photoBase64) {
          result.textContent = '写真を見ています...';
          const photoWords = await extractWordsFromPhoto(photoBase64);
          allWords.push(...photoWords);
        }

        addWordsToBank(allWords);

        const wordLabels = allWords.map(w => w.word);
        result.textContent = `おぼえた：${wordLabels.join('　')}`;
        textarea.value = '';
        charCount.textContent = '0 / 300';
        clearPhoto();

        if (window.gameScene) window.gameScene.showLearnedWords(wordLabels);

      } catch (e) {
        result.textContent = 'エラーが発生しました';
        console.error(e);
      } finally {
        submitBtn.disabled = false;
      }
    });

    // ---- 発話生成 ----
    async function generateUtterance(figure) {
      const wb = loadWordBank();
      if (wb.length === 0) return '…';

      const topWords = [...wb].filter(w => isValidWord(w.word)).sort((a, b) => b.weight - a.weight).slice(0, 12);
      const wordList = topWords.map(w => w.word).join('・');

      const res = await fetch('/api/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            {
              role: 'system',
              content: `あなたは棒人間「${figure.name}」です。
理解力は高いが表現が制限されています。

気分：${figure.mood || '普通'}
覚えた単語：${wordList}

状況を内部で把握したうえで、以下のルールで一言だけ発言してください：
- 15文字以内
- 単語帳の言葉を使う
- 流暢な説明文は書かない
- たまに単語一つだけでもいい
- 「…」「〜ね」「〜かも」を時々使う
- 発言内容のみ返す（説明・かぎかっこ不要）`,
            },
            { role: 'user', content: 'いま一言だけ言って。' },
          ],
          max_tokens: 30,
          temperature: 0.95,
        }),
      });

      const data = await res.json();
      return data.choices[0].message.content.trim().replace(/「|」/g, '');
    }

    const utteranceBtn = document.getElementById('utterance-btn');
    utteranceBtn.addEventListener('click', async () => {
      if (!window.gameScene) return;
      utteranceBtn.disabled = true;
      try {
        const text = await generateUtterance(window.gameScene.figure);
        window.gameScene.showSpeechBubble(text);
      } catch (e) {

      } finally {
        utteranceBtn.disabled = false;
      }
    });

    // ---- デバッグパネル ----

    const debugPanel = document.getElementById('debug-panel');

    function toggleDebug() {
      debugVisible = !debugVisible;
      debugPanel.style.display = debugVisible ? 'block' : 'none';
    }

    document.getElementById('debug-toggle').addEventListener('click', toggleDebug);
    document.addEventListener('keydown', e => {
      if ((e.key === 'd' || e.key === 'D') && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {

      }

    const EMOTION_CLS = { positive: 'w-pos', negative: 'w-neg', neutral: 'w-neu' };

    // 単語帳の変化を検知して再描画（毎フレームinnerHTMLを上書きするとスクロール位置がリセットされるため）
    let lastWordBankKey = '';
    function renderWordBank() {
      const wb = loadWordBank();
      const key = wb.map(w => `${w.word}:${w.weight}`).join(',');
      if (key === lastWordBankKey) return;
      lastWordBankKey = key;

      document.getElementById('d-word-count').textContent = `(${wb.length})`;
      const wordsEl = document.getElementById('d-words');
      if (wb.length === 0) {
        wordsEl.innerHTML = '<span class="w-neu">—</span>';
      } else {
        wordsEl.innerHTML = wb.map(w => {
          const cls = EMOTION_CLS[w.emotion] || 'w-neu';
          const esc = w.word.replace(/"/g, '&quot;');
          return `<div class="d-word-row"><span class="${cls}">×${w.weight} ${w.word}</span><button class="d-del-btn" data-word="${esc}">×</button></div>`;
        }).join('');
      }
    }

    document.getElementById('d-words').addEventListener('click', e => {
      const btn = e.target.closest('.d-del-btn');
      if (!btn) return;
      wordBank = wordBank.filter(w => w.word !== btn.dataset.word);
      saveWordBank();
      lastWordBankKey = '';
      renderWordBank();
    });

    function updateDebug(figure) {

        bytes < 1024 ? `${bytes}B` : `${(bytes / 1024).toFixed(1)}KB`;
    }

    // ---- MDアップロード（開発用） ----

    // Markdown記法を除去してプレーンテキストに
    function stripMarkdown(md) {
      let t = md;
      // フェンスコードブロック（```lang\n...\n``` を行単位で除去）
      t = t.replace(/^```[\w]*\r?\n[\s\S]*?\n```[ \t]*$/gm, '');
      // 行頭に残った孤立した ``` を除去
      t = t.replace(/^```.*$/gm, '');
      // 残ったバックティック
      t = t.replace(/`[^`\n]+`/g, '').replace(/`/g, '');
      // 見出し
      t = t.replace(/^#{1,6}\s+/gm, '');
      // 画像・リンク
      t = t.replace(/!\[.*?\]\(.*?\)/g, '');
      t = t.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
      // 太字・斜体
      t = t.replace(/[*_]{1,3}([^*_\n]+)[*_]{1,3}/g, '$1');
      // 箇条書き・番号リスト・引用
      t = t.replace(/^[-*+]\s+/gm, '');
      t = t.replace(/^\d+\.\s+/gm, '');
      t = t.replace(/^>\s+/gm, '');
      // 水平線・テーブル行
      t = t.replace(/^[-*_]{3,}$/gm, '');
      t = t.replace(/^\|.*$/gm, '');
      // HTMLタグ
      t = t.replace(/<[^>]+>/g, '');
      // 連続空行を整理
      t = t.replace(/\n{3,}/g, '\n\n');
      return t.trim();
    }

    // MDテキストから単語抽出（ドキュメント向けプロンプト）
    async function extractWordsFromMdText(text) {
      const res = await fetch('/api/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            {
              role: 'system',
              content: `以下のテキストから印象的・重要な単語を抽出し、JSON配列のみ返してください。

優先順位：
1. 人名・地名・固有名詞（category: person または place）最大3個
2. 感情・状態を表す語（category: emotion）1〜2個
3. その他の重要な名詞・概念語（food / event / other）最大4個

フィールド：word / emotion（positive・negative・neutral）/ category（person・food・place・emotion・event・other）
注意：動詞は辞書形で。技術用語・英単語もそのまま含めてよい。
説明文は不要。JSON配列のみ返す。`,
            },
            { role: 'user', content: text.slice(0, 1500) }, // 長すぎる場合は先頭1500字
          ],
          max_tokens: 250,
          temperature: 0.7,
        }),
      });
      const data = await res.json();
      return parseWordJSON(data.choices[0].message.content.trim());
    }

    (function initMdPanel() {
      let mdFiles = [];   // { file, name, size, status, words }

      const toggle   = document.getElementById('md-toggle');
      const panel    = document.getElementById('md-panel');
      const dropZone = document.getElementById('md-drop-zone');
      const fileInput = document.getElementById('md-input');
      const fileList  = document.getElementById('md-file-list');
      const processBtn = document.getElementById('md-process');
      const clearBtn   = document.getElementById('md-clear');
      const logEl      = document.getElementById('md-log');

      let mdVisible = false;
      toggle.addEventListener('click', () => {
        mdVisible = !mdVisible;
        panel.style.display = mdVisible ? 'block' : 'none';
      });

      // ドロップゾーン
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        addFiles([...e.dataTransfer.files].filter(f => f.name.endsWith('.txt')));
      });
      fileInput.addEventListener('change', e => {
        addFiles([...e.target.files]);
        fileInput.value = '';
      });

      function addFiles(files) {
        files.forEach(f => {
          if (!mdFiles.find(x => x.name === f.name)) {
            mdFiles.push({ file: f, name: f.name, size: f.size, status: 'pending', words: [] });
          }
        });
        renderFileList();
        processBtn.disabled = mdFiles.length === 0;
      }

      function renderFileList() {
        if (mdFiles.length === 0) {
          fileList.innerHTML = '';
          return;
        }
        fileList.innerHTML = mdFiles.map((f, i) => {
          const kb = (f.size / 1024).toFixed(1);
          const statusLabels = { pending: '—', running: '処理中', done: '完了', error: 'エラー' };
          return `<div class="md-file-row">
            <span class="fname" title="${f.name}">${f.name}</span>
            <span class="fsize">${kb}KB</span>
            <span class="fstatus ${f.status}" id="fstatus-${i}">${statusLabels[f.status]}</span>
          </div>`;
        }).join('');
      }

      function addLog(msg, type = 'info') {
        const line = document.createElement('div');
        line.className = `log-${type}`;
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      clearBtn.addEventListener('click', () => {
        mdFiles = [];
        fileList.innerHTML = '';
        logEl.innerHTML = '';
        processBtn.disabled = true;
      });

      processBtn.addEventListener('click', async () => {
        processBtn.disabled = true;
        clearBtn.disabled = true;
        logEl.innerHTML = '';
        addLog('処理開始...', 'info');

        let totalWords = 0;
        for (let i = 0; i < mdFiles.length; i++) {
          const f = mdFiles[i];
          if (f.status === 'done') continue;

          f.status = 'running';
          renderFileList();

          try {
            const text = (await f.file.text()).trim();

            if (text.length < 5) {
              f.status = 'done';
              addLog(`${f.name}: スキップ（テキストなし）`, 'info');
              renderFileList();
              continue;
            }

            const words = await extractWordsFromMdText(text);
            addWordsToBank(words);
            f.status = 'done';
            f.words  = words;
            totalWords += words.length;

            addLog(`${f.name}: ${words.map(w => w.word).join(' ')}`, 'ok');
          } catch (e) {
            f.status = 'error';
            addLog(`${f.name}: エラー`, 'err');
          }

          renderFileList();
          if (i < mdFiles.length - 1) await new Promise(r => setTimeout(r, 400));
        }

        addLog(`完了 — ${totalWords}語を追加`, 'ok');
        processBtn.disabled = false;
        clearBtn.disabled   = false;
      });
    })();

    // ---- Phaser ----
    class StickFigure {
      constructor(scene, x) {
        this.name        = 'A';
        this.x           = CHAIR.x;
        this.vx          = 0;
        this.dir         = -1;
        this.t           = 0;
        this.state       = 'SITTING';
        this.targetX     = CHAIR.x;
        this.nextState   = 'SITTING';
        this.mood        = null;
        this.personality = null;
        this.g           = scene.add.graphics();
      }

      update(delta) {
        if (this.state === 'WALKING') {
          this.t += delta / 1000;
          const dx = this.targetX - this.x;
          if (Math.abs(dx) < 3) {
            this.x     = this.targetX;
            this.vx    = 0;
            this.state = this.nextState;
            if (this.nextState === 'SITTING') this.dir = -1;
          } else {
            this.vx  = Math.sign(dx) * 45;
            this.x  += this.vx * delta / 1000;
            this.dir = Math.sign(dx);
          }
        } else if (this.state === 'STANDING') {
          this.t += delta / 1000 * 0.5;
          this.vx = 0;
        } else {
          this.vx = 0;
        }
        this.draw();
      }

      draw() {
        const g = this.g;
        g.clear();
        g.lineStyle(2, 0x1e1e1e, 1);
        g.fillStyle(0x1e1e1e, 1);
        if      (this.state === 'WALKING')  this.drawWalking(g);
        else if (this.state === 'STANDING') this.drawStanding(g);
        else                                this.drawSitting(g);
      }

      drawWalking(g) {
        const x = this.x, dir = this.dir;
        const s = Math.sin(this.t * 4.0) * 0.38;
        const R = 9, BL = 26, LL = 22, AL = 17;
        const hipY  = GROUND - LL;
        const shldY = hipY - BL;
        g.fillCircle(x, shldY - R - 2, R);
        this._ln(g, x, shldY, x, hipY);
        this._ln(g, x, hipY, x + dir * Math.sin(s) * LL, hipY + Math.cos(s) * LL);
        this._ln(g, x, hipY, x - dir * Math.sin(s) * LL, hipY + Math.cos(s) * LL);
        this._ln(g, x, shldY, x - dir * Math.sin(s) * AL, shldY + AL * 0.9);
        this._ln(g, x, shldY, x + dir * Math.sin(s) * AL, shldY + AL * 0.9);
      }

      drawStanding(g) {
        const x = this.x;
        const R = 9, BL = 26, LL = 22, AL = 17;
        const hipY  = GROUND - LL;
        const shldY = hipY - BL;
        const bob   = Math.sin(this.t * 1.2) * 1.0;
        g.fillCircle(x, shldY - R - 2 + bob, R);
        this._ln(g, x, shldY + bob, x, hipY);
        this._ln(g, x, hipY, x + 6, GROUND);
        this._ln(g, x, hipY, x - 6, GROUND);
        this._ln(g, x, shldY + bob, x + AL * 0.55, shldY + AL * 0.85 + bob);
        this._ln(g, x, shldY + bob, x - AL * 0.55, shldY + AL * 0.85 + bob);
      }

      drawSitting(g) {
        const dir = this.dir;
        const hipX = CHAIR.x, hipY = CHAIR.seatY;
        const R = 9, BL = 26, AL = 17;
        const shldY    = hipY - BL;
        const thighLen = 16;
        const shinLen  = GROUND - hipY - 2;
        g.fillCircle(hipX, shldY - R - 2, R);
        this._ln(g, hipX, shldY, hipX, hipY);
        // 前脚
        this._ln(g, hipX, hipY,     hipX + dir * thighLen,       hipY);
        this._ln(g, hipX + dir * thighLen, hipY, hipX + dir * thighLen, hipY + shinLen);
        // 後脚（奥行き感）
        this._ln(g, hipX, hipY + 2, hipX + dir * (thighLen - 4), hipY + 2);
        this._ln(g, hipX + dir * (thighLen - 4), hipY + 2, hipX + dir * (thighLen - 4), hipY + shinLen - 3);
        // 腕
        this._ln(g, hipX, shldY, hipX + dir * AL * 0.5,  shldY + AL * 0.9);
        this._ln(g, hipX, shldY, hipX - dir * AL * 0.35, shldY + AL * 0.8);
      }

      _ln(g, x1, y1, x2, y2) {
        g.beginPath();
        g.moveTo(x1, y1);
        g.lineTo(x2, y2);
        g.strokePath();
      }

      get headY() {
        if (this.state === 'SITTING') return CHAIR.seatY - 26 - 9 - 2;
        return GROUND - 22 - 26 - 9 - 2;
      }

      toggleAction() {
        if (this.state === 'SITTING' || (this.state === 'WALKING' && this.nextState === 'SITTING')) {
          const minX     = WALL_W + 40;
          const maxX     = CHAIR.x - 80;
          this.targetX   = minX + Math.random() * (maxX - minX);
          this.nextState = 'STANDING';
          this.state     = 'WALKING';
          this.dir       = Math.sign(this.targetX - this.x) || -1;
        } else {
          this.targetX   = CHAIR.x;
          this.nextState = 'SITTING';
          this.state     = 'WALKING';
          this.dir       = Math.sign(CHAIR.x - this.x) || 1;
        }
      }
    }

    class RoomScene extends Phaser.Scene {
      constructor() { super({ key: 'RoomScene' }); }

      create() {
        this.add.rectangle(W / 2, H / 2, W, H, C.bg);
        this.add.rectangle(W / 2, H - FLOOR_H / 2, W, FLOOR_H, C.floorFill);
        this.add.rectangle(W / 2, GROUND, W, 3, C.wall);
        this.add.rectangle(W / 2, GROUND + 8, W, 10, C.baseboard);
        this.add.rectangle(W / 2, CEIL_H / 2, W, CEIL_H, C.wall);
        this.add.rectangle(WALL_W / 2, H / 2, WALL_W, H, C.wall);
        this.add.rectangle(W - WALL_W / 2, H / 2, WALL_W, H, C.wall);

        // 椅子
        const cg   = this.add.graphics();
        const legH = GROUND - (CHAIR.seatY + CHAIR.seatH);
        cg.fillStyle(0x1e1e1e, 1);
        cg.fillRect(CHAIR.x - CHAIR.seatW / 2, CHAIR.seatY, CHAIR.seatW, CHAIR.seatH);
        cg.fillRect(CHAIR.x + CHAIR.seatW / 2 - CHAIR.backW, CHAIR.seatY - CHAIR.backH, CHAIR.backW, CHAIR.backH + CHAIR.seatH);
        cg.fillRect(CHAIR.x - CHAIR.seatW / 2,            CHAIR.seatY + CHAIR.seatH, 3, legH);
        cg.fillRect(CHAIR.x + CHAIR.seatW / 2 - 3,        CHAIR.seatY + CHAIR.seatH, 3, legH);

        this.figure = new StickFigure(this, W / 2);

        this.notifText = this.add.text(W / 2, 60, '', {
          fontSize: '12px',
          color: '#1e1e1e',
          backgroundColor: '#f2f0eb',
          padding: { x: 8, y: 4 },
        }).setOrigin(0.5).setAlpha(0);

        this.input.on('pointerdown', () => this.figure.toggleAction());

        window.gameScene = this;
      }

      update(_, delta) {
        this.figure.update(delta);

        if (this.notifText.alpha > 0) {
          this.notifText.setX(this.figure.x);
        }
        if (this.bubble) {
          this.bubble.setX(this.figure.x);
        }

        updateDebug(this.figure);
      }

      showSpeechBubble(text) {
        if (this.bubble) {
          this.bubble.destroy();
          this.bubble = null;
        }

        const txt = this.add.text(0, 0, text, {
          fontSize: '12px',
          color: '#1e1e1e',
          padding: { x: 9, y: 6 },
        }).setOrigin(0.5);

        const bg = this.add.rectangle(0, 0, txt.width + 18, txt.height + 12, 0xf2f0eb);
        bg.setStrokeStyle(1.5, 0x1e1e1e);

        this.bubble = this.add.container(
          this.figure.x,
          this.figure.headY - 24,
          [bg, txt]
        );

        this.tweens.add({
          targets: this.bubble,
          alpha: 0,
          delay: 3800,
          duration: 600,
          onComplete: () => {
            if (this.bubble) { this.bubble.destroy(); this.bubble = null; }
          },
        });
      }

      showLearnedWords(words) {
        this.notifText.setText(words.join('　'));
        this.notifText.setAlpha(1);
        this.notifText.setY(this.figure.headY - 20);

        this.tweens.add({
          targets: this.notifText,
          alpha: 0,
          delay: 1800,
          duration: 600,
        });
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      width: W,
      height: H,
      scene: RoomScene,
      parent: document.body,
      backgroundColor: '#f2f0eb',
    });
  </script>
